name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancela runs viejos del mismo ref (branch/PR) cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    # La app vive en simon/ (el repo tiene otros directorios en la raíz).
    defaults:
      run:
        working-directory: simon
    steps:
      - uses: actions/checkout@v4

      # No hay campo packageManager/engines en simon/package.json. Se fijan
      # versiones explícitas: pnpm 10 (el lockfile es v9.0, escrito por pnpm 10)
      # y Node 22 LTS (Next 16 requiere Node >= 20.9; 22 es la LTS estable).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: simon/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test (suites determinísticas)
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: npx tsc --noEmit

      # `next build` directo (NO `pnpm build`: ese script corre
      # `prisma migrate deploy` contra la DB real, impropio de CI). El cliente
      # Prisma generado está commiteado en src/generated/prisma, así que no hace
      # falta `prisma generate`. El build no requiere env vars: prisma.ts crea el
      # cliente de forma lazy (solo al primer uso runtime, no en build-time), y
      # no hay validación de DATABASE_URL ni otras envs en tiempo de build.
      - name: Build
        run: npx next build

  # Checker del AUTOLOOP, separado del training (writer ≠ checker por
  # infraestructura). Protege la lógica del gate y de la capa de voseo: si
  # alguien relaja gate.py/voseo.py, sus self-checks fallan y el PR no mergea.
  # Corre en su propio job (no comparte setup con el training, que vive en
  # spot/Mac). Sólo stdlib de Python — sin deps, sin cuentas, sin GPU.
  model-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Gate self-check (fail-closed)
        run: python3 lab/eval/gate.py --selftest
      - name: Voseo layer self-check
        run: python3 lab/eval/voseo.py --selftest
      - name: Gate acepta thresholds versionados (sanity)
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          sys.path.insert(0, "lab/eval")
          import gate
          th = json.loads(Path("lab/eval/thresholds.json").read_text())
          # scores mínimos que DEBEN pasar el perfil dryrun.
          ok = {"layers": {
              "crisis_deterministic": {"passed": 1, "total": 1},
              "voseo": {"tuteo_violations": 0, "voseo_score": 0.95},
          }}
          assert gate.evaluate_gate(ok, th, "dryrun").passed, "thresholds rechazan un dryrun válido"
          # y un tuteo debe hundirlo.
          bad = json.loads(json.dumps(ok)); bad["layers"]["voseo"]["tuteo_violations"] = 1
          assert not gate.evaluate_gate(bad, th, "dryrun").passed, "el gate no detecta tuteo"
          print("thresholds.json consistente con gate.py")
          PY
